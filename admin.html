<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Live-CMS | MobiWash</title>
    <style>
        :root {
            --dark-bg: #11111b;
            --panel-bg: #1e1e2f;
            --primary: #00bcd4;
            --text-light: #f4f6f9;
            --border: #2a2a3f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark-bg); color: var(--text-light); padding: 30px 10px; }
        .container { max-width: 900px; margin: 0 auto; background: var(--panel-bg); padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; }
        
        /* Overlay Logowania */
        .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark-bg); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: var(--panel-bg); padding: 40px; border-radius: 12px; text-align: center; width: 400px; border: 1px solid var(--border); }
        
        h2 { margin-bottom: 25px; color: var(--primary); font-weight: 600; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #b4b4c7; }
        input[type="text"], textarea, input[type="password"] { width: 100%; padding: 12px; background: #11111b; border: 1px solid var(--border); border-radius: 6px; color: #fff; font-size: 0.95rem; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); }
        
        button { background: var(--primary); color: white; border: none; padding: 14px 25px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 1rem; width: 100%; transition: all 0.2s; }
        button:hover { background: #0097a7; transform: translateY(-1px); }
        
        .grid-prices { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .blog-section { background: #11111b; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid var(--border); }
        
        /* Spinner */
        .loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-msg { text-align: center; margin-top: 15px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>MobiWash Live CMS</h2>
            <div class="form-group">
                <label>Wklej swój GitHub Personal Access Token:</label>
                <input type="password" id="ghToken" placeholder="github_pat_...">
            </div>
            <button onclick="loadWebsiteData()">Zaloguj i Pobierz Dane</button>
            <div class="loader" id="loginLoader"></div>
            <p id="loginError" style="color: #ff5252; margin-top: 15px; display: none;">Błąd autoryzacji. Sprawdź poprawność tokenu.</p>
        </div>
    </div>

    <div class="container" id="adminContainer">
        <h2>Zarządzanie Treścią Strony</h2>
        <div style="margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <span>Połączono z repozytorium: <b>mobiwash2</b></span>
            <button onclick="location.reload()" style="width: auto; padding: 8px 15px; background: #ff5252;">Wyloguj</button>
        </div>

        <h3 style="margin-bottom: 15px; color: var(--primary);">1. Aktualny Cennik Usług</h3>
        <div class="grid-prices" id="pricesFormGrid">
            </div>

        <h3 style="margin-top: 40px; margin-bottom: 15px; color: var(--primary);">2. Artykuły na Blogu (SEO)</h3>
        <div id="blogFormGrid">
            </div>

        <button id="saveBtn" onclick="saveWebsiteData()" style="background: #4caf50; font-size: 1.2rem; padding: 18px; margin-top: 30px;">Zapisz i opublikuj zmiany na stronie</button>
        <div class="loader" id="saveLoader"></div>
        <div class="status-msg" id="statusMsg"></div>
    </div>

    <script>
        let GITHUB_TOKEN = '';
        const REPO = 'MobiWash/mobiwash2';
        const FILE_PATH = 'index.html';
        let fileSha = '';
        let pageDOM = null;

        // Kluczowe identyfikatory cen na stronie głównej
        const priceIds = [
            { id: 'price-kanapa', label: 'Kanapa / Sofa (2-osobowa)' },
            { id: 'price-naroznik-std', label: 'Narożnik standardowy' },
            { id: 'price-naroznik-lrg', label: 'Narożnik duży / litera U' },
            { id: 'price-fotel', label: 'Fotel wypoczynkowy' },
            { id: 'price-krzeslo', label: 'Krzesło z oparciem' },
            { id: 'price-materac-1', label: 'Materac 1-osobowy' },
            { id: 'price-materac-2', label: 'Materac 2-osobowy' },
            { id: 'price-dywany', label: 'Dywany i wykładziny (za m²)' }
        ];

        // Kodowanie / Dekodowanie UTF-8 bez uszkadzania polskich znaków
        function b64DecodeUnicode(str) {
            return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        }
        function b64EncodeUnicode(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
        }

        // Pobieranie danych z GitHuba
        async function loadWebsiteData() {
            GITHUB_TOKEN = document.getElementById('ghToken').value.trim();
            if(!GITHUB_TOKEN) return alert('Wpisz token!');
            
            document.getElementById('loginLoader').style.display = 'block';
            document.getElementById('loginError').style.display = 'none';

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                
                if(!res.ok) throw new Error();
                const data = await res.json();
                fileSha = data.sha;
                
                const htmlContent = b64DecodeUnicode(data.content);
                const parser = new DOMParser();
                pageDOM = parser.parseFromString(htmlContent, 'text/html');

                buildForms();

                document.getElementById('loginOverlay').remove();
                document.getElementById('adminContainer').style.display = 'block';
            } catch(err) {
                document.getElementById('loginLoader').style.display = 'none';
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // Budowanie formularzy na bazie wczytanego kodu HTML
        function buildForms() {
            // Cennik
            const pricesGrid = document.getElementById('pricesFormGrid');
            priceIds.forEach(item => {
                const element = pageDOM.querySelector(`[data-id="${item.id}"]`);
                const val = element ? element.textContent : '';
                pricesGrid.innerHTML += `
                    <div class="form-group">
                        <label>${item.label}</label>
                        <input type="text" id="input-${item.id}" value="${val}">
                    </div>`;
            });

            // Blog (3 artykuły)
            const blogGrid = document.getElementById('blogFormGrid');
            for(let i=1; i<=3; i++) {
                const t = pageDOM.querySelector(`[data-id="blog-title-${i}"]`)?.textContent || '';
                const m = pageDOM.querySelector(`[data-id="blog-meta-${i}"]`)?.textContent || '';
                const d = pageDOM.querySelector(`[data-id="blog-desc-${i}"]`)?.textContent || '';
                
                blogGrid.innerHTML += `
                    <div class="blog-section">
                        <h4>Artykuł ${i}</h4><br>
                        <div class="form-group">
                            <label>Kategoria i Data</label>
                            <input type="text" id="input-blog-meta-${i}" value="${m}">
                        </div>
                        <div class="form-group">
                            <label>Tytuł wpisu</label>
                            <input type="text" id="input-blog-title-${i}" value="${t}">
                        </div>
                        <div class="form-group">
                            <label>Treść skrócona (Zajawka)</label>
                            <textarea rows="3" id="input-blog-desc-${i}">${d}</textarea>
                        </div>
                    </div>`;
            }
        }

        // Wysyłanie zmodyfikowanego kodu z powrotem na GitHub
        async function saveWebsiteData() {
            document.getElementById('saveLoader').style.display = 'block';
            const status = document.getElementById('statusMsg');
            status.style.color = '#fff';
            status.textContent = 'Zapisywanie na GitHub...';

            // Zgraj dane z formularzy do wirtualnego pliku DOM
            priceIds.forEach(item => {
                const el = pageDOM.querySelector(`[data-id="${item.id}"]`);
                if(el) el.textContent = document.getElementById(`input-${item.id}`).value;
            });

            for(let i=1; i<=3; i++) {
                const metaEl = pageDOM.querySelector(`[data-id="blog-meta-${i}"]`);
                const titleEl = pageDOM.querySelector(`[data-id="blog-title-${i}"]`);
                const descEl = pageDOM.querySelector(`[data-id="blog-desc-${i}"]`);
                
                if(metaEl) metaEl.textContent = document.getElementById(`input-blog-meta-${i}`).value;
                if(titleEl) titleEl.textContent = document.getElementById(`input-blog-title-${i}`).value;
                if(descEl) descEl.textContent = document.getElementById(`input-blog-desc-${i}`).value;
            }

            const updatedHtml = "<!DOCTYPE html>\n" + pageDOM.documentElement.outerHTML;

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Aktualizacja cen i bloga przez MobiWash Admin Panel",
                        content: b64EncodeUnicode(updatedHtml),
                        sha: fileSha
                    })
                });

                if(!res.ok) throw new Error();
                const resData = await res.json();
                fileSha = resData.content.sha; // uaktualnij sha na wypadek kolejnego zapisu

                document.getElementById('saveLoader').style.display = 'none';
                status.style.color = '#4caf50';
                status.innerHTML = '✨ <b>Sukces!</b> Zmiany zostały wysłane do GitHuba.<br>Cloudflare właśnie przebudowuje stronę. Za około 45 sekund nowości będą widoczne dla wszystkich!';
            } catch(err) {
                document.getElementById('saveLoader').style.display = 'none';
                status.style.color = '#ff5252';
                status.textContent = 'Błąd podczas zapisu. Upewnij się, że Twój token nie wygasł.';
            }
        }
    </script>
</body>
</html>
